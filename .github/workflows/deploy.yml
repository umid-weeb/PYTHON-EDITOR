name: CD - AWS EC2 Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_SSH_KEY }}
          port: 22
          script: |
            set -e
            cd ~/PYTHON-EDITOR
            # Serverdagi har qanday lokal o'zgarishlarni o'chirib, GitHub-dagi kodni majburan olish
            git fetch origin main
            git reset --hard origin/main
            # Backend papkasiga kirish va konteynerlarni qayta qurish
            cd backend
            docker compose up --build -d
            # Ishlatilmayotgan barcha imijlar va build keshini agressiv tozalash
            docker image prune -af
            docker builder prune -f